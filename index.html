<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>TT DISTRIBUIDOR - Vendas Mobile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container" id="appContainer">
    <div id="conteudoApp">
        <div class="loading-message">Carregando...</div>
    </div>
</div>

<!-- MODAIS GLOBAIS -->
<div id="modalAlertaCustom" class="modal-overlay">
    <div class="modal-card">
        <i class="fas fa-info-circle"></i>
        <p id="mensagemAlertaCustom">Mensagem</p>
        <button id="btnFecharAlertaCustom">OK</button>
    </div>
</div>

<div id="modalQuantidade" class="modal-overlay">
    <div class="modal-card">
        <i class="fas fa-boxes"></i>
        <p>Informe a quantidade</p>
        <input type="number" id="inputQuantidade" min="1" class="modal-input">
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button id="btnConfirmarLancamento" class="modal-btn confirmar">Confirmar</button>
            <button id="btnCancelarLancamento" class="modal-btn cancelar">Cancelar</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
