<div class="tela" id="telaUsuarios">
    <div class="card-content" style="display: flex; flex-direction: column; height: 100%;">
        <!-- Cabeçalho -->
        <div style="display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-voltar"><i class="fas fa-arrow-left"></i></button>
                <h2 style="color: #1E5A99; margin: 0; font-size: 1.4rem;">Cadastro de usuários</h2>
            </div>
            <img src="https://i.imgur.com/1BQJhXp.png" style="max-width: 60px; height: auto;">
        </div>

        <!-- Formulário (Inputs e Dropdown) - flex-shrink: 0 para não encolher -->
        <div style="flex-shrink: 0; margin-top: 15px;">
            <input type="text" id="editUsuario" placeholder="Usuário" class="input-large" disabled>
            <input type="password" id="editSenha" placeholder="Senha" class="input-large" disabled>
            <select id="editNivel" class="select-large" disabled>
                <option value="" disabled selected>Nível de acesso</option>
                <option value="Vendedor">Vendedor</option>
                <option value="Administrador">Administrador</option>
                <option value="Desenvolvedor">Desenvolvedor</option>
            </select>
            <input type="text" id="pesquisaUsuario" class="search-box-large" placeholder="🔍 Pesquisar">
        </div>

        <!-- Tabela (Rolável) - flex: 1 e overflow-y: auto -->
        <div id="listaUsuariosContainer" style="flex: 1; overflow-y: auto; margin-top: 10px; border: 1px solid #e2e8f0; border-radius: 8px;">
            <!-- A tabela será gerada aqui -->
        </div>

        <!-- Botões (Estáticos no Final) - flex-shrink: 0 -->
        <div class="action-buttons" style="flex-shrink: 0; margin-top: 10px;">
            <button id="btnAdicionarUsuario" class="btn-action"><i class="fas fa-plus"></i><span>Adicionar</span></button>
            <button id="btnEditarUsuario" class="btn-action"><i class="fas fa-pen"></i><span>Editar</span></button>
            <button id="btnExcluirUsuario" class="btn-action"><i class="fas fa-trash"></i><span>Excluir</span></button>
            <button id="btnCancelarUsuario" class="btn-action"><i class="fas fa-times"></i><span>Cancelar</span></button>
            <button id="btnSalvarUsuario" class="btn-action"><i class="fas fa-save"></i><span>Salvar</span></button>
            <button id="btnMenuUsuarios" class="btn-action"><i class="fas fa-bars"></i><span>Menu</span></button>
        </div>
    </div>
</div>
