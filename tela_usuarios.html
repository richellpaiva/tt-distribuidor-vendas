<div class="tela" id="telaUsuarios">
    <div class="card-content" style="display: flex; flex-direction: column; height: 100%;">
        <div class="tela-header-nofixed" style="flex-shrink: 0;">
            <button class="btn-voltar"><i class="fas fa-arrow-left"></i></button>
            <h2 style="color: #1E5A99; margin: 0;"><i class="fas fa-users"></i> Cadastro de usuários</h2>
        </div>

        <!-- Formulário -->
        <div style="flex-shrink: 0; margin-top: 15px;">
            <div class="form-group"><label>Usuário *</label><input type="text" id="editUsuario" placeholder="Digite o nome de usuário" disabled></div>
            <div class="form-group"><label>Senha</label><input type="password" id="editSenha" placeholder="Digite a senha" disabled></div>
            <div class="form-group"><label>Nível de Acesso</label>
                <select id="editNivel" disabled>
                    <option value="" disabled selected>Selecione</option>
                    <option value="Vendedor">Vendedor</option>
                    <option value="Administrador">Administrador</option>
                    <option value="Desenvolvedor">Desenvolvedor</option>
                </select>
            </div>
            <input type="text" id="pesquisaUsuario" class="search-box" placeholder="🔍 Pesquisar por nome de usuário...">
        </div>

        <!-- Tabela (Rolável) -->
        <div id="listaUsuariosContainer" style="flex: 1; overflow-y: auto; margin-top: 10px; border: 1px solid #e2e8f0; border-radius: 8px;">
            <!-- A tabela será gerada aqui -->
        </div>

        <!-- Botões de Ação (Estáticos no Final) -->
        <div class="botoes-form" style="flex-shrink: 0; margin-top: 15px; justify-content: space-between;">
            <button id="btnAdicionarUsuario" class="btn-form btn-novo"><i class="fas fa-plus"></i> Adicionar</button>
            <button id="btnEditarUsuario" class="btn-form btn-editar"><i class="fas fa-edit"></i> Editar</button>
            <button id="btnExcluirUsuario" class="btn-form btn-excluir"><i class="fas fa-trash"></i> Excluir</button>
            <button id="btnSalvarUsuario" class="btn-form btn-salvar"><i class="fas fa-save"></i> Salvar</button>
            <button id="btnCancelarUsuario" class="btn-form btn-cancelar"><i class="fas fa-times"></i> Cancelar</button>
            <button id="btnMenuUsuarios" class="btn-form btn-menu"><i class="fas fa-bars"></i> Menu</button>
        </div>
    </div>
</div>
