<div class="tela" id="telaLancarProdutos">
    <div class="card-content" style="height:100%; display:flex; flex-direction:column;">
        <div class="tela-header-nofixed">
            <button class="btn-voltar"><i class="fas fa-arrow-left"></i></button>
            <h2><i class="fas fa-cube"></i> Lançar Produtos</h2>
        </div>

        <div style="flex-shrink:0;">
            <input type="text" id="pesquisaProdutoLancamento" class="search-box" placeholder="🔍 Pesquisar por código ou descrição...">
            <div class="totais-container" id="totaisLancamento" style="margin-bottom:10px;">
                <div class="total-card">
                    <i class="fas fa-boxes"></i>
                    <div class="total-label">Qtde Total</div>
                    <div class="total-value" id="lancQtdeTotal">0</div>
                </div>
                <div class="total-card">
                    <i class="fas fa-dollar-sign"></i>
                    <div class="total-label">Valor Total</div>
                    <div class="total-value" id="lancValorTotal">R$ 0,00</div>
                </div>
            </div>
        </div>

        <div class="estoque-container" id="tabelaLancamentoContainer" style="flex:1; overflow-y:auto;">
            <div class="loading-message">Carregando produtos...</div>
        </div>
    </div>
</div>
