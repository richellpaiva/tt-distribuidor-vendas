<!-- APROVADO - NÃO MEXER NA ESTRUTURA DA TELA -->
<div class="tela" id="telaVenda" style="display: flex;">
    <div class="card-content">
        <div class="tela-header-nofixed">
            <button class="btn-voltar" onclick="mostrarTela('menu')">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2><i class="fas fa-cart-plus" style="margin-right: 8px;"></i> Nova Venda</h2>
        </div>
        
        <!-- APROVADO: Display do cliente selecionado -->
        <div class="cliente-selecionado-box" id="clienteSelecionadoDisplay">
            <strong>Nenhum cliente selecionado</strong>
        </div>
        
        <!-- APROVADO: Botão para pesquisar cliente -->
        <button id="btnPesquisarCliente" class="btn-pesquisar-cliente">
            <i class="fas fa-search" style="margin-right: 8px;"></i> Pesquisar Cliente
        </button>
        
        <!-- EXPANSÍVEL: Futura lista de produtos da venda -->
        <div class="placeholder-mensagem" style="margin-top: 20px;">
            <i class="fas fa-receipt"></i>
            Adicionar produtos à venda<br>
            <span style="font-size: 0.85rem;">Em breve</span>
        </div>
        
        <!-- EXPANSÍVEL: Botão finalizar venda -->
        <button id="btnFinalizarVenda" class="btn-nova-venda-estoque" style="background: #28a745; margin-top: 20px;" disabled>
            <i class="fas fa-check-circle" style="margin-right: 8px;"></i> Finalizar Venda
        </button>
    </div>
</div>
