<div class="tela" id="telaVenda" style="display: flex;">
    <div class="card-content">
        <div class="tela-header-nofixed">
            <button class="btn-voltar">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2><i class="fas fa-cart-plus" style="margin-right: 8px;"></i> Nova Venda</h2>
        </div>
        
        <div id="clienteSelecionado" class="cliente-selecionado">
            <strong>Nenhum cliente selecionado</strong>
        </div>
        
        <input type="text" id="pesquisaClientes" class="search-box" placeholder="🔍 Pesquisar cliente por nome ou CPF...">
        
        <div id="listaClientes" class="lista-clientes">
            <div class="placeholder-mensagem">
                <i class="fas fa-spinner fa-pulse"></i>
                Carregando clientes...
            </div>
        </div>
        
        <button id="btnInserirCliente" class="btn-inserir-cliente">
            <i class="fas fa-user-plus" style="margin-right: 8px;"></i> Inserir Novo Cliente
        </button>
        
        <div class="placeholder-mensagem" style="margin-top: 20px;">
            <i class="fas fa-receipt"></i>
            Módulo de produtos em construção<br>
            <span style="font-size: 0.85rem;">Em breve: adição de produtos à venda</span>
        </div>
    </div>
</div>
