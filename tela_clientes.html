<!-- APROVADO - NÃO MEXER NA ESTRUTURA DA TELA -->
<div class="tela" id="telaClientes" style="display: flex;">
    <div class="card-content">
        <!-- CABEÇALHO - PADRÃO AZUL -->
        <div class="tela-header-nofixed">
            <button class="btn-sair">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2><i class="fas fa-users" style="margin-right: 8px; color: #1E5A99;"></i> Cadastro de Clientes</h2>
        </div>
        
        <!-- PESQUISA - BORDA E FOCO AZUL -->
        <input type="text" id="pesquisaClientesCadastro" class="search-box" placeholder="🔍 Pesquisar por nome ou CPF...">
        
        <!-- LISTA DE CLIENTES -->
        <div class="clientes-lista-cadastro" style="max-height: 200px; overflow-y: auto; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 12px;">
            <div id="listaClientesCadastro">
                <div class="loading-message"><i class="fas fa-spinner fa-pulse"></i> Carregando clientes...</div>
            </div>
        </div>
        
        <!-- FORMULÁRIO DE CLIENTE - PADRÃO AZUL -->
        <div class="form-cliente" style="margin-top: 15px;">
            <h3 style="color: #1E5A99; margin-bottom: 15px; font-size: 1rem;">Dados do Cliente</h3>
            
            <div class="form-group">
                <label style="color: #1E5A99;">Nome Completo *</label>
                <input type="text" id="editNomeCliente" placeholder="Digite o nome completo" style="border: 1px solid #cbd5e0; border-radius: 8px; padding: 10px; width: 100%;">
            </div>
            
            <div class="form-group">
                <label style="color: #1E5A99;">CPF</label>
                <input type="text" id="editCpfCliente" placeholder="000.000.000-00" style="border: 1px solid #cbd5e0; border-radius: 8px; padding: 10px; width: 100%;">
            </div>
            
            <div class="form-group">
                <label style="color: #1E5A99;">Telefone</label>
                <input type="text" id="editTelefoneCliente" placeholder="(00) 00000-0000" style="border: 1px solid #cbd5e0; border-radius: 8px; padding: 10px; width: 100%;">
            </div>
            
            <div class="form-row" style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label style="color: #1E5A99;">UF</label>
                    <input type="text" id="editUfCliente" placeholder="PI" maxlength="2" style="border: 1px solid #cbd5e0; border-radius: 8px; padding: 10px; width: 100%;">
                </div>
                <div class="form-group" style="flex: 2;">
                    <label style="color: #1E5A99;">Cidade</label>
                    <input type="text" id="editCidadeCliente" placeholder="Teresina" style="border: 1px solid #cbd5e0; border-radius: 8px; padding: 10px; width: 100%;">
                </div>
            </div>
            
            <div class="form-group">
                <label style="color: #1E5A99;">Endereço</label>
                <input type="text" id="editEnderecoCliente" placeholder="Rua, Avenida..." style="border: 1px solid #cbd5e0; border-radius: 8px; padding: 10px; width: 100%;">
            </div>
            
            <div class="form-row" style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label style="color: #1E5A99;">Número</label>
                    <input type="text" id="editNumeroCliente" placeholder="Número" style="border: 1px solid #cbd5e0; border-radius: 8px; padding: 10px; width: 100%;">
                </div>
                <div class="form-group" style="flex: 2;">
                    <label style="color: #1E5A99;">Complemento</label>
                    <input type="text" id="editComplementoCliente" placeholder="Apto, Bloco..." style="border: 1px solid #cbd5e0; border-radius: 8px; padding: 10px; width: 100%;">
                </div>
            </div>
            
            <div class="form-group">
                <label style="color: #1E5A99;">CEP</label>
                <input type="text" id="editCepCliente" placeholder="00000-000" style="border: 1px solid #cbd5e0; border-radius: 8px; padding: 10px; width: 100%;">
            </div>
            
            <!-- BOTÕES - TODOS AZUIS -->
            <div class="botoes-form" style="display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap;">
                <button id="btnCriarNovoCliente" class="btn-form" style="flex: 1; background: #2B7BC9; color: white; border: none; border-radius: 10px; padding: 12px; font-weight: 600;">
                    <i class="fas fa-plus"></i> NOVO
                </button>
                <button id="btnSalvarCliente" class="btn-form" style="flex: 1; background: #1E5A99; color: white; border: none; border-radius: 10px; padding: 12px; font-weight: 600;">
                    <i class="fas fa-save"></i> SALVAR
                </button>
                <button id="btnExcluirCliente" class="btn-form" style="flex: 1; background: #dc3545; color: white; border: none; border-radius: 10px; padding: 12px; font-weight: 600;">
                    <i class="fas fa-trash"></i> EXCLUIR
                </button>
                <button id="btnCancelarCliente" class="btn-form" style="flex: 1; background: #6c757d; color: white; border: none; border-radius: 10px; padding: 12px; font-weight: 600;">
                    <i class="fas fa-times"></i> CANCELAR
                </button>
            </div>
        </div>
    </div>
</div>
