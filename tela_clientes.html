<div class="tela" id="telaClientes" style="display: flex;">
    <div class="card-content">
        <div class="tela-header-nofixed">
            <button class="btn-sair">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2><i class="fas fa-users" style="margin-right: 8px;"></i> Cadastro de Clientes</h2>
        </div>
        
        <input type="text" id="pesquisaClientesCadastro" class="search-box" placeholder="🔍 Pesquisar cliente por nome ou CPF...">
        
        <div id="listaClientesCadastro" class="lista-clientes" style="max-height: 200px;">
            <div class="placeholder-mensagem">
                <i class="fas fa-spinner fa-pulse"></i>
                Carregando clientes...
            </div>
        </div>
        
        <div class="form-cliente">
            <h3 style="color: #1E5A99; margin: 15px 0 10px 0;">Dados do Cliente</h3>
            
            <input type="hidden" id="editIdCliente">
            
            <div class="form-group">
                <label>Nome Completo *</label>
                <input type="text" id="editNomeCliente" placeholder="Digite o nome completo">
            </div>
            
            <div class="form-group">
                <label>CPF *</label>
                <input type="text" id="editCpfCliente" placeholder="000.000.000-00">
            </div>
            
            <div class="form-group">
                <label>Telefone</label>
                <input type="text" id="editTelefoneCliente" placeholder="(00) 00000-0000">
            </div>
            
            <div class="form-group">
                <label>UF</label>
                <input type="text" id="editUfCliente" placeholder="PI" maxlength="2">
            </div>
            
            <div class="form-group">
                <label>Cidade</label>
                <input type="text" id="editCidadeCliente" placeholder="Teresina">
            </div>
            
            <div class="form-group">
                <label>Endereço</label>
                <input type="text" id="editEnderecoCliente" placeholder="Rua, Avenida...">
            </div>
            
            <div class="form-group">
                <label>Número</label>
                <input type="text" id="editNumeroCliente" placeholder="Número">
            </div>
            
            <div class="form-group">
                <label>Complemento</label>
                <input type="text" id="editComplementoCliente" placeholder="Apto, Bloco...">
            </div>
            
            <div class="form-group">
                <label>CEP</label>
                <input type="text" id="editCepCliente" placeholder="00000-000">
            </div>
            
            <div class="botoes-form">
                <button id="btnSalvarCliente" class="btn-form btn-salvar">💾 SALVAR</button>
                <button id="btnExcluirCliente" class="btn-form btn-excluir">🗑️ EXCLUIR</button>
                <button id="btnCancelarCliente" class="btn-form btn-cancelar">✖️ CANCELAR</button>
            </div>
        </div>
    </div>
</div>
