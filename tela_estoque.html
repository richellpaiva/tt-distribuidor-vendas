<div class="tela" id="telaEstoque" style="display: flex;">
    <div class="card-content">
        <div class="estoque-fixed-header">
            <div class="tela-header">
                <button class="btn-voltar">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h2><i class="fas fa-boxes" style="margin-right: 8px;"></i> Estoque</h2>
            </div>
            
            <input type="text" id="pesquisaEstoque" class="search-box" placeholder="🔍 Pesquisar por código ou descrição...">
            
            <div class="totais-container">
                <div class="total-card">
                    <i class="fas fa-dollar-sign"></i>
                    <div class="total-label">Valor Total</div>
                    <div class="total-value" id="valorTotal">R$ 0,00</div>
                </div>
                <div class="total-card">
                    <i class="fas fa-boxes"></i>
                    <div class="total-label">Quantidade Total</div>
                    <div class="total-value" id="qtTotal">0</div>
                </div>
            </div>
            
            <button id="btnNovaVendaEstoque" class="btn-nova-venda-estoque">
                <i class="fas fa-cart-plus" style="margin-right: 8px;"></i> Efetuar Nova Venda
            </button>
        </div>

        <div id="estoqueContainer" class="estoque-container">
            <div class="placeholder-mensagem">
                <i class="fas fa-database"></i>
                Carregando estoque...<br>
                <span style="font-size: 0.85rem;">Aguarde um momento</span>
            </div>
        </div>
    </div>
</div>
