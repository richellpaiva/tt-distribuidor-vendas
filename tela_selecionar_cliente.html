<div class="tela" id="telaSelecionarCliente">
    <div class="card-content">
        <div class="tela-header-nofixed">
            <button class="btn-voltar"><i class="fas fa-arrow-left"></i></button>
            <h2><i class="fas fa-users"></i> Selecionar Cliente</h2>
        </div>

        <input type="text" id="pesquisaCliente" class="search-box" placeholder="🔍 Pesquisar por Nome ou CPF...">

        <div id="listaClientesContainer" class="lista-clientes" style="flex:1; overflow-y:auto;">
            <div class="loading-message">Carregando clientes...</div>
        </div>

        <button id="btnCadastrarNovoCliente" class="btn-primary btn-secondary" style="margin-top:10px;">
            <i class="fas fa-user-plus"></i> Cadastrar Novo Cliente
        </button>
    </div>
</div>
