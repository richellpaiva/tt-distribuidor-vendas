<!-- APROVADO - NÃO MEXER NA ESTRUTURA DA TELA -->
<div class="tela-selecionar-cliente" id="telaSelecionarCliente">
    <div class="tela-header-nofixed">
        <button class="btn-voltar">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h2><i class="fas fa-users" style="margin-right: 8px;"></i> Selecionar Cliente</h2>
    </div>
    
    <!-- APROVADO: Campo de pesquisa -->
    <input type="text" id="pesquisaCliente" class="search-box" placeholder="🔍 Pesquisar por Nome, CPF ou Telefone...">
    
    <!-- APROVADO: Container da lista de clientes -->
    <div id="listaClientesContainer" class="clientes-lista">
        <div class="loading-message">
            <i class="fas fa-spinner fa-pulse"></i> Carregando clientes...
        </div>
    </div>
    
    <!-- APROVADO: Botão para cadastrar novo cliente -->
    <button id="btnCadastrarNovoCliente" class="btn-inserir-cliente" style="margin-top: 15px;">
        <i class="fas fa-user-plus" style="margin-right: 8px;"></i> Cadastrar Novo Cliente
    </button>
</div>
